<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SystemBlacklem · Visits</title>

  <style>
    :root{
      --bg0:#030A12; --bg1:#041c2d; --bg2:#0b4f7a;
      --glass: rgba(255,255,255,.10);
      --stroke: rgba(255,255,255,.18);
      --txt: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.66);
      --accent: #00ffd1;
      --danger: #ff5c7a;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --r: 18px;
    }
    *{ box-sizing:border-box }
    html,body{ height:100% }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--txt);
      background: radial-gradient(1200px 700px at 10% 0%, var(--bg2), var(--bg1) 45%, var(--bg0) 100%);
      overflow-x:hidden;
    }
    #fxCanvas{ position:fixed; inset:0; z-index:0; pointer-events:none; }

    .wrap{
      position:relative;
      z-index:2;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding: 24px 14px;
    }

    .card{
      width:min(980px, 96vw);
      border-radius: var(--r);
      background: var(--glass);
      border:1px solid var(--stroke);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    header{
      padding: 18px 18px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      border-bottom:1px solid rgba(255,255,255,.12);
    }
    .brand{
      display:flex; flex-direction:column; gap:2px;
    }
    .brand b{ font-size:16px; letter-spacing:.2px }
    .brand span{ font-size:12px; color:var(--muted) }

    .stats{
      display:flex; gap:10px; flex-wrap:wrap;
      font-size:12px; color:var(--muted);
      align-items:center; justify-content:flex-end;
    }
    .pill{
      padding:8px 10px;
      border-radius:999px;
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.12);
      display:flex; gap:8px; align-items:center;
    }
    .pill b{ color:var(--txt) }

    main{
      padding: 16px 18px 18px;
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 14px;
    }
    @media (max-width: 860px){
      main{ grid-template-columns: 1fr; }
    }

    .panel{
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.14);
      padding: 14px;
    }

    .chips{
      display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;
    }
    .chip{
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color: var(--txt);
      padding: 9px 12px;
      border-radius: 999px;
      cursor:pointer;
      font-weight:600;
      font-size:12px;
      transition: transform .12s ease, background .12s ease;
      user-select:none;
    }
    .chip:hover{ transform: translateY(-1px); background: rgba(255,255,255,.10); }
    .chip[aria-pressed="true"]{
      background: rgba(0,255,209,.14);
      border-color: rgba(0,255,209,.35);
      box-shadow: 0 0 0 3px rgba(0,255,209,.10) inset;
    }

    #hint{
      margin: 6px 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height:1.35;
    }

    #tipTitle{
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing:.2px;
    }
    #tipSteps{
      margin: 0;
      padding: 0;
      list-style:none;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    #tipSteps li{
      display:grid;
      grid-template-columns: 28px 1fr;
      gap:10px;
      align-items:flex-start;
    }
    #tipSteps .n{
      width:28px; height:28px;
      border-radius: 10px;
      display:grid; place-items:center;
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      font-weight:800;
    }
    #tipSteps span{ color: rgba(255,255,255,.88); line-height:1.35; }

    .actions{
      display:flex; gap:10px; flex-wrap:wrap;
      margin-top: 14px;
    }
    .btn{
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color: var(--txt);
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-weight:700;
      font-size: 13px;
      transition: transform .12s ease, background .12s ease;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.12); }
    .btn.primary{
      background: rgba(0,255,209,.16);
      border-color: rgba(0,255,209,.35);
    }

    .side h3{ margin:0 0 10px; font-size:14px; color:rgba(255,255,255,.92) }
    .mini{
      display:flex; flex-direction:column; gap:10px;
      color: var(--muted);
      font-size:13px;
      line-height:1.4;
    }
    .mini .row{
      display:flex; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }
    .mini .row b{ color: var(--txt); }

    #audioBanner{
      display:none;
      margin-top:10px;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      border-radius: 12px;
      background: rgba(255,92,122,.12);
      border:1px solid rgba(255,92,122,.25);
      color: rgba(255,255,255,.90);
      font-size: 13px;
    }

    #toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      z-index: 50;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.16);
      color: var(--txt);
      box-shadow: var(--shadow);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events:none;
    }
    #toast.show{
      opacity:1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>
  <!-- Fondo FX -->
  <canvas id="fxCanvas"></canvas>

  <div class="wrap">
    <div class="card">
      <header>
        <div class="brand">
          <b>SystemBlacklem · Tips</b>
          <span>Tip útil en 15 segundos (seguridad, estudio, productividad, bienestar)</span>
        </div>

        <div class="stats">
          <div class="pill">Visitas: <b id="visitCount">—</b></div>
          <div class="pill">Racha: <b id="streak">—</b></div>
          <button class="btn" id="btnMusic" type="button">🔊 Música: AUTO</button>
        </div>
      </header>

      <main>
        <section class="panel">
          <div class="chips">
            <button class="chip" id="chipSeg"  aria-pressed="true"  type="button">Seguridad</button>
            <button class="chip" id="chipEst"  aria-pressed="false" type="button">Estudio</button>
            <button class="chip" id="chipProd" aria-pressed="false" type="button">Productividad</button>
            <button class="chip" id="chipBien" aria-pressed="false" type="button">Bienestar</button>
          </div>

          <div id="hint">Tip corto de ciberseguridad. Ideal para compartir.</div>

          <h2 id="tipTitle">Cargando tip…</h2>
          <ul id="tipSteps"></ul>

          <div class="actions">
            <button class="btn primary" id="btnRefresh" type="button">🔄 Nuevo tip</button>
            <button class="btn" id="btnCopy" type="button">📋 Copiar</button>
            <button class="btn" id="btnShare" type="button">📲 Compartir</button>
          </div>
        </section>

        <aside class="panel side">
          <h3>Estado</h3>
          <div class="mini">
            <div class="row"><span>Historial</span> <b id="historyCount">0</b></div>
            <div class="row"><span>Audio</span> <b id="audioState">🔊 Música: AUTO</b></div>
          </div>

          <div id="audioBanner">
            <span>Para activar música, toque “Habilitar”.</span>
            <div style="display:flex; gap:8px;">
              <button class="btn" id="btnEnableAudio" type="button">Habilitar</button>
              <button class="btn" id="btnDismissAudio" type="button">No gracias</button>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </div>

  <!-- Audio (puede ser vacío al inicio, pero debe existir el elemento) -->
  <audio id="bgMusic" preload="auto" loop>
    <!-- Ponga aquí su mp3 si desea: <source src="./audio.mp3" type="audio/mpeg"> -->
  </audio>

  <div id="toast" role="status" aria-live="polite"></div>

  <script>
  // ✅ IMPORTANTE: arrancar cuando el DOM ya existe
  document.addEventListener("DOMContentLoaded", () => {

    /* =========================
       Helpers: localStorage seguro
       ========================= */
    function safeGet(key){
      try{
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        return JSON.parse(raw);
      }catch{ return null; }
    }
    function safeSet(key, value){
      try{ localStorage.setItem(key, JSON.stringify(value)); }catch{}
    }

    /* =========================
       CONFIG API (contador + perfil + eventos)
       ========================= */
    const API_BASE = "https://api.systemblacklem.com";
    const PAGE_KEY = "visits";

    const ENDPOINT_TRACK = `${API_BASE}/api/public/visits/track?page=${encodeURIComponent(PAGE_KEY)}`;
    const ENDPOINT_ME    = `${API_BASE}/api/public/visits/me?page=${encodeURIComponent(PAGE_KEY)}`;
    const ENDPOINT_EVENT = `${API_BASE}/api/public/visits/event`;

    /* =========================
       VisitorId anónimo (persistente)
       ========================= */
    const VISITOR_KEY = "sb_visitor_id_v1";

    function randomId(len = 20){
      const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let out = "";
      for (let i=0;i<len;i++) out += chars[Math.floor(Math.random()*chars.length)];
      return out;
    }

    function getVisitorId(){
      const stored = safeGet(VISITOR_KEY);
      if (typeof stored === "string" && stored.length >= 8) return stored;
      const v = `v_${randomId(22)}`;
      safeSet(VISITOR_KEY, v);
      return v;
    }

    const VISITOR_ID = getVisitorId();

    /* =========================
       Fetch con header X-Visitor-Id
       ========================= */
    async function apiFetch(url, options = {}){
      const headers = new Headers(options.headers || {});
      headers.set("X-Visitor-Id", VISITOR_ID);
      if (options.body && !headers.has("Content-Type")) headers.set("Content-Type", "application/json");

      const res = await fetch(url, { cache:"no-store", ...options, headers });
      if (res.status === 204) return null;
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    function applyProfile(data){
      if (!data) return;
      const vc = document.getElementById("visitCount");
      if (vc) vc.textContent = String(data.total ?? "—");
      if (typeof data.streak === "number") {
        const st = document.getElementById("streak");
        if (st) st.textContent = String(data.streak);
      }
    }

    async function loadMe(){ try{ applyProfile(await apiFetch(ENDPOINT_ME,{method:"GET"})); }catch{} }
    async function track(){
      try{ applyProfile(await apiFetch(ENDPOINT_TRACK,{method:"GET"})); }
      catch{ const vc=document.getElementById("visitCount"); if (vc) vc.textContent="—"; }
    }
    async function sendEvent(type){
      try{ applyProfile(await apiFetch(ENDPOINT_EVENT,{method:"POST", body: JSON.stringify({page:PAGE_KEY,type})})); }
      catch{}
    }

    /* =========================
       Preferencias + estado local
       ========================= */
    const PREF_KEY = "sb_visits_prefs_v1";
    const HISTORY_KEY = "sb_tip_history_v1";

    const prefs = safeGet(PREF_KEY) ?? { topic:"seguridad", musicState:"AUTO", lastDay:"" };

    /* =========================
       Contenido (tips)
       ========================= */
    const TIPS = [
      { topic:"seguridad", title:"Evite phishing en 20 segundos", steps:[
        "Revise el dominio completo (no solo el nombre del remitente).",
        "No abra enlaces acortados si no está 100% seguro del origen.",
        "Active 2FA en correo y redes (ideal: app autenticadora)."
      ]},
      { topic:"seguridad", title:"Proteja su WhatsApp en 2 minutos", steps:[
        "Active “Verificación en dos pasos” (PIN) en WhatsApp.",
        "Bloquee su SIM con PIN desde el teléfono.",
        "Nunca comparta códigos recibidos por SMS, aunque “parezca soporte”."
      ]},
      { topic:"seguridad", title:"Contraseñas: la regla 12–3", steps:[
        "Use mínimo 12 caracteres (frase fácil de recordar).",
        "Incluya 3 tipos: letras, números y símbolo.",
        "No repita contraseña: use un gestor si es posible."
      ]},
      { topic:"estudio", title:"Método 25–5 (Pomodoro) sin estrés", steps:[
        "25 min enfoque: solo una tarea.",
        "5 min descanso: agua, respiración, estiramiento.",
        "Cada 4 rondas, descanso largo de 15 min."
      ]},
      { topic:"estudio", title:"Aprenda más rápido con “Active Recall”", steps:[
        "Después de leer, cierre el material y explique con sus palabras.",
        "Haga 5 preguntas y respóndalas sin mirar.",
        "Revise errores y repita al día siguiente."
      ]},
      { topic:"productividad", title:"Plan de 3 prioridades (10 min)", steps:[
        "Escriba 3 resultados concretos del día (no 10 tareas).",
        "Bloquee 1 hora para la prioridad #1 sin interrupciones.",
        "Al final del día: ajuste y deje listo el primer paso de mañana."
      ]},
      { topic:"productividad", title:"Regla de los 2 minutos", steps:[
        "Si algo toma menos de 2 minutos, hágalo de inmediato.",
        "Si no, anótelo y prográmelo (no lo deje en la cabeza).",
        "Evite micro-tareas dispersas que rompen el enfoque."
      ]},
      { topic:"bienestar", title:"Reduzca ansiedad por pantalla (3 pasos)", steps:[
        "Baje brillo y active “modo noche” después de las 6pm.",
        "Quite notificaciones no esenciales por 24 horas.",
        "Antes de dormir: 10 min sin pantalla (música suave o lectura)."
      ]},
      { topic:"bienestar", title:"Descanso ocular 20–20–20", steps:[
        "Cada 20 minutos, mire a 6 metros por 20 segundos.",
        "Parpadee conscientemente para evitar resequedad.",
        "Si duele la cabeza: pause 5 minutos y respire."
      ]}
    ];

    const elTitle = document.getElementById("tipTitle");
    const elSteps = document.getElementById("tipSteps");
    const elToast = document.getElementById("toast");
    let currentTip = null;

    function toast(msg){
      if (!elToast) return;
      elToast.textContent = msg;
      elToast.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(()=> elToast.classList.remove("show"), 1400);
    }

    function historyGet(){ return safeGet(HISTORY_KEY) ?? []; }
    function historyPush(text){
      const h = historyGet();
      const next = [text, ...h.filter(x => x !== text)].slice(0, 7);
      safeSet(HISTORY_KEY, next);
      const hc = document.getElementById("historyCount");
      if (hc) hc.textContent = String(next.length);
    }

    function tipToText(t){
      return [`✨ ${t.title}`, ...t.steps.map((s,i)=>`${i+1}) ${s}`), `— SystemBlacklem · Alberto Lem`].join("\n");
    }
    function escapeHtml(s){
      return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function renderTip(t){
      currentTip = t;
      if (elTitle) elTitle.textContent = t.title;
      if (elSteps){
        elSteps.innerHTML = t.steps.map((s,i)=>(
          `<li><span class="n">${i+1}</span><span>${escapeHtml(s)}</span></li>`
        )).join("");
      }
      historyPush(tipToText(t));
    }

    function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

    function newTip(){
      const topic = prefs.topic || "seguridad";
      const pool = TIPS.filter(t => t.topic === topic);
      renderTip(pick(pool.length ? pool : TIPS));
      if (navigator.vibrate) navigator.vibrate(18);
    }

    const chips = {
      seguridad: document.getElementById("chipSeg"),
      estudio: document.getElementById("chipEst"),
      productividad: document.getElementById("chipProd"),
      bienestar: document.getElementById("chipBien"),
    };

    function setTopic(topic){
      prefs.topic = topic;
      safeSet(PREF_KEY, prefs);

      for (const [k, el] of Object.entries(chips)){
        if (el) el.setAttribute("aria-pressed", String(k === topic));
      }

      const hint = document.getElementById("hint");
      if (hint){
        hint.textContent =
          topic === "seguridad" ? "Tip corto de ciberseguridad. Ideal para compartir." :
          topic === "estudio" ? "Tip de estudio aplicable hoy. Rotación rápida." :
          topic === "productividad" ? "Acción simple para mejorar enfoque y resultados." :
          "Higiene digital y descanso mental en pocos pasos.";
      }

      newTip();
    }

    chips.seguridad?.addEventListener("click", ()=> setTopic("seguridad"));
    chips.estudio?.addEventListener("click", ()=> setTopic("estudio"));
    chips.productividad?.addEventListener("click", ()=> setTopic("productividad"));
    chips.bienestar?.addEventListener("click", ()=> setTopic("bienestar"));

    async function copyText(text){
      try{ if (navigator.clipboard?.writeText){ await navigator.clipboard.writeText(text); return true; } }catch{}
      try{
        const ta = document.createElement("textarea");
        ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
        document.body.appendChild(ta); ta.focus(); ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      }catch{ return false; }
    }
    function shareWhatsApp(text){ window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank", "noopener"); }
    async function shareNative(text){
      if (navigator.share){ try{ await navigator.share({ text }); return true; }catch{} }
      return false;
    }

    document.getElementById("btnRefresh")?.addEventListener("click", async () => { newTip(); await sendEvent("NEW_TIP"); });
    document.getElementById("btnCopy")?.addEventListener("click", async () => {
      const text = currentTip ? tipToText(currentTip) : "";
      const ok = await copyText(text);
      toast(ok ? "✅ Copiado al portapapeles" : "⚠️ No se pudo copiar");
      if (ok) await sendEvent("COPY_TIP");
    });
    document.getElementById("btnShare")?.addEventListener("click", async () => {
      const text = currentTip ? tipToText(currentTip) : "";
      const ok = await shareNative(text);
      if (!ok) shareWhatsApp(text);
      await sendEvent("SHARE_TIP");
    });

    // FX Canvas
    const canvas = document.getElementById("fxCanvas");
    const ctx = canvas?.getContext("2d", { alpha:true });
    let dots = [], raf = null;

    function getDpr(){ return Math.min(2, window.devicePixelRatio || 1); }
    function resize(){
      if (!canvas || !ctx) return;
      const dpr = getDpr();
      canvas.width = Math.floor(innerWidth*dpr);
      canvas.height = Math.floor(innerHeight*dpr);
      ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
    }
    function density(){ const base = Math.floor(innerWidth/10); return Math.max(70, Math.min(160, base)); }
    function initDots(){
      const n = density();
      dots = Array.from({length:n},()=>({
        x:Math.random()*innerWidth, y:Math.random()*innerHeight,
        r:0.7+Math.random()*1.9, vy:0.45+Math.random()*1.55,
        vx:-0.18+Math.random()*0.36, wob:Math.random()*Math.PI*2,
        woSpeed:0.004+Math.random()*0.010, a:0.18+Math.random()*0.55
      }));
    }
    function draw(){
      if (!ctx) return;
      ctx.clearRect(0,0, innerWidth, innerHeight);
      for (const d of dots){
        d.wob += d.woSpeed;
        d.x += d.vx + Math.sin(d.wob)*0.28;
        d.y += d.vy;
        if (d.y > innerHeight + 10){ d.y=-10; d.x=Math.random()*innerWidth; }
        if (d.x < -10) d.x = innerWidth + 10;
        if (d.x > innerWidth + 10) d.x = -10;
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${d.a})`;
        ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fill();
      }
      raf = requestAnimationFrame(draw);
    }
    window.addEventListener("resize", ()=>{ resize(); initDots(); });
    document.addEventListener("visibilitychange", ()=> {
      if (document.hidden && raf){ cancelAnimationFrame(raf); raf=null; }
      if (!document.hidden && !raf) draw();
    });
    resize(); initDots(); draw();

    // Música (si no hay source, solo quedará en OFF/AUTO sin reproducir)
    const audio = document.getElementById("bgMusic");
    const btnMusic = document.getElementById("btnMusic");
    const audioState = document.getElementById("audioState");
    const banner = document.getElementById("audioBanner");
    let musicState = prefs.musicState || "AUTO";

    function setBanner(show){ if (banner) banner.style.display = show ? "flex" : "none"; }
    function updateAudioUI(){
      const label = musicState==="ON" ? "🔊 Música: ON" : (musicState==="OFF" ? "🔇 Música: OFF" : "🔊 Música: AUTO");
      if (btnMusic) btnMusic.textContent = label;
      if (audioState) audioState.textContent = label;
      prefs.musicState = musicState; safeSet(PREF_KEY, prefs);
    }
    async function startMusic(){
      if (!audio) return;
      audio.volume = 0.65; audio.muted = false;
      try{ await audio.play(); musicState="ON"; setBanner(false); }
      catch{ musicState="AUTO"; setBanner(true); }
      updateAudioUI();
    }
    function stopMusic(){
      try{ audio?.pause(); if (audio) audio.currentTime=0; }catch{}
      musicState="OFF"; setBanner(false); updateAudioUI();
    }
    btnMusic?.addEventListener("click", ()=> { musicState==="ON" ? stopMusic() : startMusic(); });
    document.getElementById("btnEnableAudio")?.addEventListener("click", startMusic);
    document.getElementById("btnDismissAudio")?.addEventListener("click", stopMusic);

    function userGestureKick(){
      if (musicState==="AUTO") startMusic();
      removeEventListener("pointerdown", userGestureKick);
      removeEventListener("keydown", userGestureKick);
    }
    addEventListener("pointerdown", userGestureKick, { passive:true });
    addEventListener("keydown", userGestureKick);

    updateAudioUI();

    (async function init(){
      const hc = document.getElementById("historyCount");
      if (hc) hc.textContent = String((historyGet()||[]).length);
      setTopic(prefs.topic || "seguridad");
      await loadMe();
      await track();
      setInterval(track, 30000);
    })();

  });
  </script>
</body>
</html>
